<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Chatbot Testi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* --- SENİN TASARIM KODLARIN (AYNEN KORUNDU) --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .chat-wrapper {
      background: #ffffff;
      width: 100%;
      max-width: 480px;
      height: 80vh;
      max-height: 720px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      
      /* Taşan kısımları gizle ve iframe'i içine hapset */
      overflow: hidden;
      display: flex; 
      flex-direction: column;
    }

    /* --- IFRAME STİLİ (YENİ EKLENDİ) --- */
    /* Bu, n8n'i senin kutuna tam oturtur */
    iframe {
        width: 100%;
        height: 100%;
        border: none; /* Kenarlıkları kaldır */
    }
  </style>
</head>
<body>

  <div class="chat-wrapper">
     <iframe src="https://z2o4qssc.rpcl.app/webhook/e281b04a-a777-4918-be69-c2be8916c79b/chat"></iframe>
  </div>

</body>
</html>
